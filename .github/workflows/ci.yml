name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZISK_VERSION: "1.0.0-alpha"
  ZISK_TARGET: riscv64ima-zisk-zkvm-elf
  # Set to a zesu release tag (e.g. "bal-devnet-3") to pin a specific version.
  # Leave empty to use the latest published release.
  ZESU_VERSION: ""

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zesu-zkvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: zesu-zkvm

      - name: Checkout zisk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 0xPolygonHermez/zisk
          ref: v${{ env.ZISK_VERSION }}
          path: zisk

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.16.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-zisk runtime deps
        run: sudo apt-get install -y libomp5 libopenmpi3t64

      - name: Install cargo-zisk
        run: |
          ZISK_BIN_DIR="${HOME}/.config/.zisk/bin"
          mkdir -p "$ZISK_BIN_DIR"
          curl -fsSL "https://raw.githubusercontent.com/0xPolygonHermez/zisk/main/ziskup/ziskup" \
            -o "$ZISK_BIN_DIR/ziskup"
          chmod +x "$ZISK_BIN_DIR/ziskup"
          "$ZISK_BIN_DIR/ziskup" --cpu --nokey
          echo "$ZISK_BIN_DIR" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Zisk Rust toolchain
        run: cargo +zisk --version 2>/dev/null || cargo-zisk toolchain install

      - name: Cache libziskos_staticlib.a
        id: cache-libziskos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: zesu-zkvm/zisk/lib/libziskos_staticlib.a
          key: libziskos-staticlib-${{ env.ZISK_VERSION }}-${{ runner.os }}

      - name: Build libziskos_staticlib.a
        if: steps.cache-libziskos.outputs.cache-hit != 'true'
        working-directory: zesu-zkvm/zisk
        run: make lib/libziskos_staticlib.a ZISK_DIR=$GITHUB_WORKSPACE/zisk

      - name: Download zesu object
        run: |
          mkdir -p /tmp/zesu-obj
          if [ -n "${{ env.ZESU_VERSION }}" ]; then
            URL="https://github.com/Consensys/zesu/releases/download/${{ env.ZESU_VERSION }}/zesu.rv64im.o"
          else
            URL="https://github.com/Consensys/zesu/releases/latest/download/zesu.rv64im.o"
          fi
          curl -fsSL "$URL" -o /tmp/zesu-obj/zesu.rv64im.o

      - name: Lint (zisk)
        working-directory: zesu-zkvm/zisk
        run: zig fmt --check src/ build.zig

      - name: Build zisk (Debug)
        working-directory: zesu-zkvm/zisk
        run: zig build -Dzesu_obj=/tmp/zesu-obj/zesu.rv64im.o

      - name: Build zisk (ReleaseFast)
        working-directory: zesu-zkvm/zisk
        run: zig build -Doptimize=ReleaseFast -Dzesu_obj=/tmp/zesu-obj/zesu.rv64im.o

      - name: Test (zisk)
        working-directory: zesu-zkvm/zisk
        run: zig build test --summary all -Dzesu_obj=/tmp/zesu-obj/zesu.rv64im.o

      - name: Lint (openvm)
        working-directory: zesu-zkvm/openvm
        run: zig fmt --check src/ build.zig

      - name: Build openvm (ReleaseFast)
        working-directory: zesu-zkvm/openvm
        run: zig build -Doptimize=ReleaseFast -Dzesu_obj=/tmp/zesu-obj/zesu.rv64im.o

      - name: Lint (linea)
        working-directory: zesu-zkvm/linea
        run: zig fmt --check src/ build.zig

      - name: Build linea (ReleaseFast)
        working-directory: zesu-zkvm/linea
        run: zig build -Doptimize=ReleaseFast -Dzesu_obj=/tmp/zesu-obj/zesu.rv64im.o

  vectors:
    name: Vectors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zesu-zkvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: zesu-zkvm

      - name: Checkout zisk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 0xPolygonHermez/zisk
          ref: v${{ env.ZISK_VERSION }}
          path: zisk

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.16.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-zisk runtime deps
        run: sudo apt-get install -y libomp5 libopenmpi3t64

      - name: Install cargo-zisk
        run: |
          ZISK_BIN_DIR="${HOME}/.config/.zisk/bin"
          mkdir -p "$ZISK_BIN_DIR"
          curl -fsSL "https://raw.githubusercontent.com/0xPolygonHermez/zisk/main/ziskup/ziskup" \
            -o "$ZISK_BIN_DIR/ziskup"
          chmod +x "$ZISK_BIN_DIR/ziskup"
          "$ZISK_BIN_DIR/ziskup" --cpu --nokey
          echo "$ZISK_BIN_DIR" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Zisk Rust toolchain
        run: cargo +zisk --version 2>/dev/null || cargo-zisk toolchain install

      - name: Cache libziskos_staticlib.a
        id: cache-libziskos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: zesu-zkvm/zisk/lib/libziskos_staticlib.a
          key: libziskos-staticlib-${{ env.ZISK_VERSION }}-${{ runner.os }}

      - name: Build libziskos_staticlib.a
        if: steps.cache-libziskos.outputs.cache-hit != 'true'
        working-directory: zesu-zkvm/zisk
        run: make lib/libziskos_staticlib.a ZISK_DIR=$GITHUB_WORKSPACE/zisk

      - name: Download zesu object
        run: |
          mkdir -p /tmp/zesu-obj
          if [ -n "${{ env.ZESU_VERSION }}" ]; then
            URL="https://github.com/Consensys/zesu/releases/download/${{ env.ZESU_VERSION }}/zesu.rv64im.o"
          else
            URL="https://github.com/Consensys/zesu/releases/latest/download/zesu.rv64im.o"
          fi
          curl -fsSL "$URL" -o /tmp/zesu-obj/zesu.rv64im.o

      - name: Run vectors
        working-directory: zesu-zkvm/zisk
        run: make test ZESU_OBJ=/tmp/zesu-obj/zesu.rv64im.o
