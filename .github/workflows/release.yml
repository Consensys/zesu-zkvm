name: Release

# Builds ELF artifacts for each supported zkVM target and publishes them to
# a GitHub Release on version tags. On PRs and main pushes the artifacts are
# uploaded as workflow artifacts so downstream consumers can test without a tag.
#
# Artifact naming follows the ere-guests convention:
#   stateless-validator-zesu-<zkvm>.elf
#
# Targets:
#   zisk    — ZisK v0.17.0; links zesu.o + zisk-wrapped.o (host + libziskos merged)
#   openvm  — OpenVM rv64im; links zesu.o + openvm-host.o; 8-byte u64 LE input header
#   linea   — Linea zkVM rv64im; links zesu.o + linea-host.o; stripped ELF; Linux ecalls

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  ZISK_VERSION: "0.17.0"

permissions:
  contents: write

jobs:
  compile-zisk:
    name: Compile stateless-validator-zesu-zisk
    runs-on: ubuntu-latest

    steps:
      # Check out all repos as siblings so path dependencies resolve:
      #   $GITHUB_WORKSPACE/zesu-zkvm   ← this repo
      #   $GITHUB_WORKSPACE/zesu        ← satisfies ../../zesu/core
      #   $GITHUB_WORKSPACE/zisk        ← used by make lib/libziskos.a
      - name: Checkout zesu-zkvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: zesu-zkvm

      - name: Checkout zesu
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/zesu
          path: zesu

      - name: Checkout zisk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 0xPolygonHermez/zisk
          ref: v${{ env.ZISK_VERSION }}
          path: zisk

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.16.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-zisk runtime deps
        run: sudo apt-get install -y libomp5 libopenmpi3t64

      - name: Install cargo-zisk
        run: |
          ZISK_BIN_DIR="${HOME}/.config/.zisk/bin"
          mkdir -p "$ZISK_BIN_DIR"
          curl -fsSL "https://raw.githubusercontent.com/0xPolygonHermez/zisk/main/ziskup/ziskup" \
            -o "$ZISK_BIN_DIR/ziskup"
          chmod +x "$ZISK_BIN_DIR/ziskup"
          "$ZISK_BIN_DIR/ziskup" --cpu --nokey
          echo "$ZISK_BIN_DIR" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Zisk Rust toolchain
        id: cache-zisk-toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.rustup/toolchains/zisk
          key: zisk-toolchain-${{ env.ZISK_VERSION }}-${{ runner.os }}

      - name: Install Zisk Rust toolchain
        if: steps.cache-zisk-toolchain.outputs.cache-hit != 'true'
        run: cargo-zisk toolchain install

      - name: Cache libziskos.a
        id: cache-libziskos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: zesu-zkvm/zisk/lib/libziskos.a
          key: libziskos-${{ env.ZISK_VERSION }}-${{ runner.os }}

      - name: Build libziskos.a
        if: steps.cache-libziskos.outputs.cache-hit != 'true'
        working-directory: zesu-zkvm/zisk
        run: make lib/libziskos.a ZISK_DIR=$GITHUB_WORKSPACE/zisk

      - name: Build Zesu ZisK ELF
        working-directory: zesu-zkvm/zisk
        run: zig build -Doptimize=ReleaseFast

      - name: Stage artifact
        run: |
          mkdir -p output
          cp zesu-zkvm/zisk/zig-out/bin/zesu-zisk output/stateless-validator-zesu-zisk.elf

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stateless-validator-zesu-zisk
          path: output/stateless-validator-zesu-zisk.elf
          if-no-files-found: error

  compile-openvm:
    name: Compile stateless-validator-zesu-openvm
    runs-on: ubuntu-latest

    steps:
      # Only zesu-zkvm and zesu are needed — no ZisK toolchain required for OpenVM.
      - name: Checkout zesu-zkvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: zesu-zkvm

      - name: Checkout zesu
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/zesu
          path: zesu

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.16.0"

      - name: Build Zesu OpenVM ELF
        working-directory: zesu-zkvm/openvm
        run: zig build -Doptimize=ReleaseFast

      - name: Stage artifact
        run: |
          mkdir -p output
          cp zesu-zkvm/openvm/zig-out/bin/zesu-openvm output/stateless-validator-zesu-openvm.elf

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stateless-validator-zesu-openvm
          path: output/stateless-validator-zesu-openvm.elf
          if-no-files-found: error

  compile-linea:
    name: Compile stateless-validator-zesu-linea
    runs-on: ubuntu-latest

    steps:
      - name: Checkout zesu-zkvm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: zesu-zkvm

      - name: Checkout zesu
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ github.repository_owner }}/zesu
          path: zesu

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: "0.16.0"

      - name: Build Zesu Linea ELF
        working-directory: zesu-zkvm/linea
        run: zig build -Doptimize=ReleaseFast

      - name: Stage artifact
        run: |
          mkdir -p output
          cp zesu-zkvm/linea/zig-out/bin/zesu-linea output/stateless-validator-zesu-linea.elf

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stateless-validator-zesu-linea
          path: output/stateless-validator-zesu-linea.elf
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [compile-zisk, compile-openvm, compile-linea]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download ZisK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stateless-validator-zesu-zisk
          path: artifacts

      - name: Download OpenVM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stateless-validator-zesu-openvm
          path: artifacts

      - name: Download Linea artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: stateless-validator-zesu-linea
          path: artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            --draft=false \
            || gh release edit "$TAG" --repo "$GITHUB_REPOSITORY"
          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            artifacts/stateless-validator-zesu-zisk.elf \
            artifacts/stateless-validator-zesu-openvm.elf \
            artifacts/stateless-validator-zesu-linea.elf \
            --clobber
